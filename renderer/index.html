<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>DataLayer Logger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── Toolbar ── -->
  <header id="toolbar">
    <div id="nav-buttons">
      <button id="back-btn"    title="Back (Alt+Left)">&#8592;</button>
      <button id="forward-btn" title="Forward (Alt+Right)">&#8594;</button>
      <button id="reload-btn"  title="Reload (F5)">&#8635;</button>
    </div>
    <input id="url-bar" type="text" spellcheck="false"
           placeholder="Enter a URL or search term…" autocomplete="off" />
    <button id="go-btn">Go</button>
  </header>

  <!-- ── Right sidebar ── -->
  <aside id="sidebar">
    <div id="sidebar-resize-handle" title="Drag to resize"></div>

    <!-- Tab buttons -->
    <nav id="sidebar-tabs">
      <button class="tab-btn active" data-tab="events">
        DataLayer&nbsp;<span id="event-badge" class="badge">0</span>
      </button>
      <button class="tab-btn" data-tab="elements">
        Clickable&nbsp;<span id="element-badge" class="badge">0</span>
      </button>
      <button class="tab-btn" data-tab="network">
        Network&nbsp;<span id="network-badge" class="badge">0</span>
      </button>
    </nav>

    <!-- ── Panel: DataLayer Events ── -->
    <div id="panel-events" class="tab-panel active">
      <div id="sidebar-header">
        <div id="sidebar-actions">
          <button id="export-btn" title="Export all events to a JSON file">Export</button>
          <button id="clear-btn"  title="Clear captured events and start a new session">Clear</button>
        </div>
      </div>

      <div id="session-path" title="Events are auto-saved here"></div>

      <div id="filter-bar">
        <input id="filter-input" type="text" placeholder="Filter by event name…" />
      </div>

      <div id="events-list" aria-live="polite"></div>

    <div id="empty-state">
      <p>No events captured yet.</p>
      <p>Navigate to a page that uses Google Tag Manager or the <code>dataLayer</code> API.</p>
    </div>
  </aside>

  <script src="renderer.js"></script>
</body>
</html>
